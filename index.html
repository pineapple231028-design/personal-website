<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人作品集 | Visual Alchemist</title>
  
  <!-- 引入 GSAP 核心与滚动插件 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  
  <!-- 引入 Three.js 用于首屏粒子特效 -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
      }
    }
  </script>

  <style>
    /* ========== 全局及色彩 ========== */
    :root {
      --bg-color: #050505;
      --text-color: #f4f4f4;
      --text-muted: #555555;
      --border-color: #222222;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      overflow-x: hidden;
      line-height: 1.6;
    }

    /* ========== 交互：自定义光标 ========== */
    .custom-cursor {
      position: fixed;
      top: 0; left: 0;
      width: 15px; height: 15px;
      border-radius: 50%;
      background-color: white;
      mix-blend-mode: difference;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width 0.3s, height 0.3s;
    }
    .custom-cursor.active {
      width: 80px; height: 80px;
      background-color: rgba(255,255,255,1);
    }

    /* ========== 基础排版 ========== */
    h1, h2, h3 { font-weight: 400; text-transform: uppercase; letter-spacing: 2px; }
    a { color: var(--text-color); text-decoration: none; position: relative; }
    .container { max-width: 1400px; margin: 0 auto; padding: 0 5vw; }
    
    .section-title {
      font-size: 0.9rem; color: var(--text-muted);
      border-top: 1px solid var(--border-color);
      padding-top: 20px; margin-bottom: 60px;
      display: flex; justify-content: space-between;
    }

    /* ========== 首屏 Hero (毛毛粒子图 + 3D氛围) ========== */
    .hero { 
      position: relative; 
      height: 100vh; 
      display: flex; 
      align-items: center; 
      overflow: hidden;
    }
    
    /* Three.js 粒子画布容器 */
    #hero-particles {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* 正中：毛毛图片的容器 */
    .hero-image-wrapper {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 75%;
      max-width: 1125px;
      z-index: 1;
      pointer-events: none;
      /* 核心科技：滤掉图片纯黑背景，与网站无缝融合 */
      mix-blend-mode: screen;
      /* 边缘渐隐遮罩，让图片和背景更自然融合 */
      -webkit-mask-image: radial-gradient(ellipse 80% 80% at center, rgba(0,0,0,1) 0%, rgba(0,0,0,1) 30%, rgba(0,0,0,0) 85%);
      mask-image: radial-gradient(ellipse 80% 80% at center, rgba(0,0,0,1) 0%, rgba(0,0,0,1) 30%, rgba(0,0,0,0) 85%);
      -webkit-mask-size: 100% 100%;
      mask-size: 100% 100%;
    }
    .hero-image-wrapper img {
      width: 100%; height: auto;
      /* 给毛毛加上轻微的上下呼吸漂浮感 */
      animation: floatBreath 6s ease-in-out infinite;
    }
    @keyframes floatBreath {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(-1deg); }
    }

    /* 左侧：文字内容 */
    .hero-content { 
      position: relative; 
      z-index: 2; 
      max-width: 600px;
      pointer-events: auto;
    }
    .hero-content h1 { font-size: clamp(3rem, 8vw, 8rem); line-height: 1; margin-bottom: 20px; }
    .hero-content p { font-size: 1.2rem; color: #999; max-width: 500px; text-shadow: 0 2px 10px rgba(0,0,0,0.8); }

    /* 移动端适配 */
    @media (max-width: 768px) {
      .hero-image-wrapper { width: 140%; left: 50%; transform: translate(-50%, -50%); opacity: 0.8; }
      .hero-content { padding-top: 20vh; }
    }

    /* ========== 01. 摄影作品：模拟胶片横向卷动 ========== */
    .horizontal-scroll-section {
      position: relative;
      width: 100vw; left: 50%; right: 50%;
      margin-left: -50vw; margin-right: -50vw;
      background: #000;
      border-top: 1px solid #333;
      border-bottom: 1px solid #333;
    }
    .filmstrip-track {
      display: flex;
      align-items: center;
      height: 100vh;
      width: max-content;
      padding: 0 10vw;
      gap: 5vw;
    }
    .photo-item {
      height: 65vh;
      position: relative;
      background: #111;
      flex-shrink: 0;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    @media (max-width: 768px) { .photo-item { height: 50vh; } }

    .photo-item img {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
      filter: grayscale(100%);
      transition: filter 0.8s, transform 0.8s;
    }
    .photo-item:hover img {
      filter: grayscale(0%);
      transform: scale(1.03);
    }
    .filmstrip-track::before, .filmstrip-track::after {
      content: ''; position: absolute; left: 0; width: 100%; height: 20px;
      background-image: radial-gradient(circle, #222 3px, transparent 4px);
      background-size: 30px 20px; z-index: 10;
    }
    .filmstrip-track::before { top: 10px; }
    .filmstrip-track::after { bottom: 10px; }

    /* ========== 02. 影像：海报遮罩入场 + 剧照画廊 ========== */
    .film-project {
      display: grid; grid-template-columns: 1fr 1fr; gap: 60px;
      margin: 150px 0; align-items: start;
    }
    @media (max-width: 900px) { .film-project { grid-template-columns: 1fr; } }
    
    .poster-container {
      position: relative; overflow: hidden; width: 100%; aspect-ratio: 2/3;
      position: sticky; top: 100px;
    }
    .poster-mask {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: var(--bg-color); z-index: 5;
    }
    .poster-container img { width: 100%; height: 100%; object-fit: cover; }

    .film-info h3 { font-size: 2.5rem; margin-bottom: 20px; }
    .film-info p { color: var(--text-muted); margin-bottom: 40px; }
    .link-btn {
      display: inline-block; padding-bottom: 5px; margin-bottom: 60px;
      border-bottom: 1px solid var(--text-muted); transition: 0.3s;
    }
    .link-btn:hover { border-color: white; padding-left: 10px; }

    /* 5张截图画廊 */
    .film-screenshots {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
    }
    .screenshot-item { overflow: hidden; aspect-ratio: 16/9; }
    .screenshot-item:nth-child(1), .screenshot-item:nth-child(2) { grid-column: span 3; }
    .screenshot-item:nth-child(n+3) { grid-column: span 2; }
    .screenshot-item img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 0.8s;
    }
    .screenshot-item:hover img { transform: scale(1.05); }

    /* ========== 03. AI 短片与底部 ========== */
    .ai-section { margin-bottom: 150px; }
    .video-wrapper { width: 100%; aspect-ratio: 16/9; background: #111; position: relative; }
    .video-wrapper video { width: 100%; height: 100%; outline: none; }
    footer { text-align: center; padding: 100px 0 50px; color: var(--text-muted); border-top: 1px solid var(--border-color); }

    .reveal { opacity: 0; transform: translateY(40px); }
  </style>
</head>
<body>

  <section class="hero">
    <!-- Three.js 生成的背景游离蓝光粒子 -->
    <div id="hero-particles"></div>
    
    <!-- 毛毛的粒子图 -->
    <div class="hero-image-wrapper">
      <!-- ！！将下方 src 替换为你保存的那张图片的路径！！ -->
      <img src="nanobanana-edited-2026-04-01T16-50-12-552Z.png" alt="Particle Buttercup">
    </div>

    <div class="container hero-content">
      <h1 class="reveal"><br></h1>
      <p class="reveal"><br></p>
    </div>
  </section>

  <div class="container">
    <!-- 为了结构平滑，占位一个空div -->
  </div>

  <section class="horizontal-scroll-section" id="photo-scroll">
    <div class="container" style="position:absolute; top: 0; left: 0; width: 100%;">
      <div class="section-title" style="margin-top:20px; border-color: #333;">
        <span>01. PHOTOGRAPHY (SCROLL ➔)</span><span>摄影画廊</span>

    </div>
    
    <div class="filmstrip-track">
      <!-- 20张占位图，请替换为你的照片链接 -->
      <div class="photo-item hover-target"><img src="摄影画廊/图片1.JPG" alt="Photo 1"></div>
      <div class="photo-item hover-target"><img src="摄影画廊/图片2.jpg" alt="Photo 2"></div>
      <div class="photo-item hover-target"><img src="摄影画廊/图片3.jpg" alt="Photo 3"></div>
      <div class="photo-item hover-target"><img src="摄影画廊/图片4.jpg" alt="Photo 4"></div>
      <div class="photo-item hover-target"><img src="摄影画廊/图片5.JPG" alt="Photo 5"></div>
      <div class="photo-item hover-target"><img src="摄影画廊/图片6.jpg" alt="Photo 6"></div>

      <div class="film-info reveal">

  <script>
    // ==========================================
    // GSAP 滚动交互与自定义光标 (保留原有所有高级逻辑)
    // ==========================================
    gsap.registerPlugin(ScrollTrigger);

    const cursor = document.getElementById('cursor');
    const hoverTargets = document.querySelectorAll('.hover-target');

    document.addEventListener('mousemove', (e) => {
      gsap.to(cursor, { x: e.clientX, y: e.clientY, duration: 0.1, ease: "power2.out" });
    });
    hoverTargets.forEach(target => {
      target.addEventListener('mouseenter', () => cursor.classList.add('active'));
      target.addEventListener('mouseleave', () => cursor.classList.remove('active'));
    });

    const horizontalSection = document.querySelector('.horizontal-scroll-section');
    const filmstrip = document.querySelector('.filmstrip-track');
    gsap.to(filmstrip, {
      x: () => -(filmstrip.scrollWidth - window.innerWidth) + "px",
      ease: "none",
      scrollTrigger: {
        trigger: horizontalSection, pin: true, scrub: 1,         
        end: () => "+=" + (filmstrip.scrollWidth - window.innerWidth)
      }
    });

    const posterContainer = document.querySelector('.poster-container');
    const posterMask = document.querySelector('.poster-mask');
    const posterImg = document.querySelector('.poster-img');
    gsap.to(posterMask, { height: 0, duration: 1.5, ease: "power4.inOut", scrollTrigger: { trigger: posterContainer, start: "top 75%" } });
    gsap.from(posterImg, { scale: 1.3, duration: 1.5, ease: "power4.inOut", scrollTrigger: { trigger: posterContainer, start: "top 75%" } });

    document.querySelectorAll('.reveal').forEach((el) => {
      gsap.to(el, {
        opacity: 1, y: 0, duration: 1, ease: "power3.out",
        scrollTrigger: { trigger: el, start: "top 85%", toggleActions: "play none none reverse" }
      });
    });
  </script>

  <!-- ========================================== -->
  <!-- 核心新增：Three.js 背景溢出蓝光飘浮粒子系统 -->
  <!-- ========================================== -->
  <script type="module">
    import * as THREE from 'three';

    const container = document.getElementById('hero-particles');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
    camera.position.z = 10;

    const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);

    // 生成散落的蓝色星尘粒子
    const particleCount = 400; // 粒子数量
    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(particleCount * 3);
    const velocities =[];
    const sizes = new Float32Array(particleCount);

    for (let i = 0; i < particleCount; i++) {
      // 随机分布在屏幕空间
      positions[i * 3] = (Math.random() - 0.5) * 30;     // x
      positions[i * 3 + 1] = (Math.random() - 0.5) * 15; // y
      positions[i * 3 + 2] = (Math.random() - 0.5) * 10; // z
      
      sizes[i] = Math.random() * 2.0 + 0.5; // 大小不一

      // 给每个粒子一个初速度：整体向左侧飘散（呼应毛毛向右冲刺的拖尾）
      velocities.push({
        x: -(Math.random() * 0.02 + 0.005), 
        y: (Math.random() - 0.5) * 0.01,
        z: (Math.random() - 0.5) * 0.01
      });
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));

    // 使用 Shader 渲染高亮发光软圆点
    const material = new THREE.ShaderMaterial({
      uniforms: {
        uColor: { value: new THREE.Color('#40e0d0') } // 绿松石/青蓝色，呼应毛毛粒子尾迹
      },
      vertexShader: `
        attribute float aSize;
        void main() {
          vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
          gl_PointSize = aSize * (20.0 / -mvPosition.z);
          gl_Position = projectionMatrix * mvPosition;
        }
      `,
      fragmentShader: `
        uniform vec3 uColor;
        void main() {
          float dist = distance(gl_PointCoord, vec2(0.5));
          if (dist > 0.5) discard;
          float alpha = smoothstep(0.5, 0.1, dist) * 0.6; // 边缘渐隐与整体透明度
          gl_FragColor = vec4(uColor, alpha);
        }
      `,
      transparent: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending // 叠加发光
    });

    const particles = new THREE.Points(geometry, material);
    scene.add(particles);

    // 动画循环：让粒子不断流逝飘动
    function animate() {
      requestAnimationFrame(animate);
      
      const posAttribute = geometry.attributes.position;
      
      for (let i = 0; i < particleCount; i++) {
        // 更新位置
        posAttribute.array[i * 3] += velocities[i].x;
        posAttribute.array[i * 3 + 1] += velocities[i].y;
        posAttribute.array[i * 3 + 2] += velocities[i].z;

        // 如果粒子飘到了屏幕最左侧之外，让它从右侧重新出现，实现无缝循环
        if (posAttribute.array[i * 3] < -15) {
          posAttribute.array[i * 3] = 15;
          posAttribute.array[i * 3 + 1] = (Math.random() - 0.5) * 15;
        }
      }
      
      posAttribute.needsUpdate = true;
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = container.clientWidth / container.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(container.clientWidth, container.clientHeight);
    });
  </script>
</body>
